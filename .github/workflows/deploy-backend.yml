name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.CLOUD_RUN_REGION }}
  SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
  REPOSITORY: ${{ vars.ARTIFACT_REPOSITORY }}

jobs:
  deploy-backend:
    name: Deploy Backend → Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE_BASE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend"
          docker build -t "${IMAGE_BASE}:${{ github.sha }}" -t "${IMAGE_BASE}:latest" ./backend
          docker push "${IMAGE_BASE}:${{ github.sha }}"
          docker push "${IMAGE_BASE}:latest"

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${{ github.sha }}"
          gcloud run deploy ${{ env.SERVICE }} \
            --image "$IMAGE" \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 1Gi \
            --timeout 3600 \
            --remove-secrets=GEMINI_API_KEY,JWT_SECRET,REDIS_URL \
            --set-env-vars "\
              GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }},\
              ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }},\
              GCS_BUCKET=${{ vars.GCS_BUCKET_NAME }},\
              GCS_BUCKET_NAME=${{ vars.GCS_BUCKET_NAME }},\
              JWT_SECRET=${{ secrets.JWT_SECRET }},\
              GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},\
              REDIS_URL=${{ secrets.REDIS_URL }}"

      - name: Print Cloud Run URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format='value(status.url)')
          echo "✅ Backend URL: $URL"
