name: Deploy MuseAI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend → Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build and push Docker image
        run: |
          gcloud builds submit \
            --tag gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ vars.CLOUD_RUN_SERVICE }} \
            ./backend

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ vars.CLOUD_RUN_SERVICE }} \
            --image gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ vars.CLOUD_RUN_SERVICE }} \
            --platform managed \
            --region ${{ vars.CLOUD_RUN_REGION }} \
            --allow-unauthenticated \
            --memory 1Gi \
            --timeout 3600 \
            --set-env-vars "\
              GOOGLE_CLOUD_PROJECT=${{ vars.GCP_PROJECT_ID }},\
              ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }},\
              GCS_BUCKET_NAME=${{ vars.GCS_BUCKET_NAME }},\
              JWT_SECRET=${{ secrets.JWT_SECRET }},\
              GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},\
              REDIS_URL=${{ secrets.REDIS_URL }}"

      - name: Print Cloud Run URL
        run: |
          URL=$(gcloud run services describe ${{ vars.CLOUD_RUN_SERVICE }} \
            --region ${{ vars.CLOUD_RUN_REGION }} \
            --format='value(status.url)')
          echo "✅ Backend URL: $URL"

  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: |
          cd frontend
          vercel pull --yes \
            --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: |
          cd frontend
          vercel build --prod \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: |
          cd frontend
          vercel deploy --prebuilt --prod \
            --token=${{ secrets.VERCEL_TOKEN }}