steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_IMAGE}:${SHORT_SHA}"
      - "./backend"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_IMAGE}:${SHORT_SHA}"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_SERVICE}"
      - "--image=${_IMAGE}:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--set-env-vars=APP_ENV=production,ENFORCE_HTTPS=true"

images:
  - "${_IMAGE}:${SHORT_SHA}"

substitutions:
  _SERVICE: "museai-backend"
  _REGION: "asia-southeast1"
  _IMAGE: "asia-southeast1-docker.pkg.dev/museai-2026/museai-repo/backend"
